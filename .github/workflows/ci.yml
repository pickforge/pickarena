name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  headless-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: app
      - run: dart format --set-exit-if-changed bin lib/core lib/export lib/headless lib/runner lib/storage test/core test/headless test/runner test/support
        working-directory: app
      - run: dart run --verbosity=error dart_arena:dart_arena_headless --help
        working-directory: app
      - run: flutter analyze
        working-directory: app
      - run: flutter test test/headless
        working-directory: app

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run web:check
      - run: bun run web:smoke
