name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  headless-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart format --set-exit-if-changed lib/headless test/headless test/support .github/workflows
      - run: flutter analyze
      - run: flutter test test/headless/headless_benchmark_runner_test.dart
