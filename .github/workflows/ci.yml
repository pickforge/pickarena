name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  headless-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart format --set-exit-if-changed bin lib/core lib/export lib/headless lib/runner lib/storage test/core test/headless test/runner test/support .github/workflows
      - run: dart run --verbosity=error dart_arena:dart_arena_headless --help
      - run: flutter analyze
      - run: flutter test test/headless
