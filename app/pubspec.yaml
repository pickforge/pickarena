name: dart_arena
description: "PickArena CLI benchmark runner for Dart and Flutter task corpora."
publish_to: 'none'
version: 1.0.0+1

executables:
  dart_arena_headless: dart_arena_headless
  dart_arena_export_leaderboard: dart_arena_export_leaderboard
  dart_arena_task_qa: dart_arena_task_qa
  dart_arena_release_report: dart_arena_release_report

environment:
  sdk: ^3.11.4

dependencies:
  equatable: ^2.0.5
  crypto: ^3.0.7
  diff_match_patch: ^0.4.1
  dio: ^5.7.0
  drift: ^2.20.3
  ffi: ^2.1.0
  sqlite3: ^3.3.1
  path: ^1.9.0
  pretty_dio_logger: ^1.4.0
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.4.13
  drift_dev: ^2.20.3
  lints: ^4.0.0
  mocktail: ^1.0.4
  test: ^1.30.0

hooks:
  user_defines:
    sqlite3:
      source: system
